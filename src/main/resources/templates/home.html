<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Data Mahasiswa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: center; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        th { background-color: #007bff; color: white; }
        .btn-tambah { background-color: #28a745; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<h2>Data Mahasiswa</h2>

<a href="/form" class="btn-tambah">+ Tambah Data</a>

<table>
    <thead>
    <tr>
        <th>No</th>
        <th>Nama</th>
        <th>NIM</th>
        <th>Jenis Kelamin</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(users)}">
        <td colspan="4" style="text-align: center; color: #666; background-color: #f9f9f9;">
            Belum ada data
        </td>
    </tr>

    <tr th:each="user, status : ${users}">
        <td th:text="${status.count}">1</td>
        <td th:text="${user.nama}">Nama Mahasiswa</td>
        <td th:text="${user.nim}">NIM Mahasiswa</td>
        <td th:text="${user.jenisKelamin}">Jenis Kelamin</td>
    </tr>
    </tbody>
</table>

</body>
</html>
