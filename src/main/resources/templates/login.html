<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Mengatur latar belakang utama: warna gelap dengan garis grid (kotak-kotak) neon redup */
        body {
            background-color: #0b0b0b;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', monospace; /* Menggunakan font retro */
        }

        /* Efek layar TV jadul (garis-garis horizontal tipis) menutupi layar tapi tetap bisa diklik */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* Desain kotak form utama */
        .login-card {
            background-color: rgba(10, 10, 10, 0.95);
            padding: 40px 30px;
            border: 4px solid #ff00ff; /* Border warna magenta neon */
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff; /* Efek menyala */
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        h2 {
            color: #00ffff; /* Warna cyan neon */
            text-shadow: 3px 3px #ff00ff; /* Bayangan magenta */
            margin-bottom: 40px;
            font-size: 20px;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #00ffff;
            font-size: 10px;
        }

        /* Input gaya kotak hitam terminal */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px;
            background-color: #000;
            border: 2px solid #00ffff;
            color: #ff00ff;
            box-sizing: border-box;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            outline: none;
        }

        /* Efek menyala saat mengetik di input */
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
        }

        /* Tombol Start ala mesin Arcade */
        button {
            width: 100%;
            background-color: transparent;
            color: #00ffff;
            border: 4px solid #00ffff;
            padding: 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background-color: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        /* Pesan error berkedip */
        .error-message {
            color: #ff0000;
            background-color: #330000;
            border: 2px dashed #ff0000;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 9px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div class="login-card">
    <h2>Insert<br>Coin</h2>

    <div th:if="${error}" class="error-message">
        <p th:text="${error}" style="margin: 0;"></p>
    </div>

    <form action="/login" method="post">
        <div class="form-group">
            <label for="username">Player 1 (User)</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Secret Code (NIM)</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Press Start</button>
    </form>
</div>

</body>
</html>
